version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rapidscada-postgres
    environment:
      POSTGRES_DB: rapidscada
      POSTGRES_USER: scada
      POSTGRES_PASSWORD: scada123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scada"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Presentation/RapidScada.WebApi/Dockerfile
    container_name: rapidscada-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=rapidscada;Username=scada;Password=scada123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: src/Services/RapidScada.Server/Dockerfile
    container_name: rapidscada-server
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=rapidscada;Username=scada;Password=scada123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
